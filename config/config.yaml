# Chat configuration
chat:
  logs_dir: /home/matsuo/instructlab-granite4/chatlogs
  model: /home/matsuo/instructlab-granite4/models/granite-4.0-1b-Q4_K_M.gguf
  temperature: 1.0

# Generate configuration (ここが戦略の肝です)
generate:
  model: /home/matsuo/instructlab-granite4/models/granite-4.0-1b-Q4_K_M.gguf
  taxonomy_path: /home/matsuo/instructlab-granite4/taxonomy
  output_dir: /home/matsuo/instructlab-granite4/datasets
  pipeline: simple # 低リソース環境向けにsimpleに変更
  sdg_scale_factor: 10 # 最初は少なめでテスト
  teacher:
    model: /home/matsuo/instructlab-granite4/models/granite-4.0-1b-Q4_K_M.gguf
    backend: llama-cpp
    backend: vllm # API経由の場合はvllmまたはopenai互換を指定
    # 外部API（OpenAI互換）を利用する設定例
    server:
      host: api.openai.com # または利用するAPIのエンドポイント
      port: 443
    # ※APIキーは環境変数「OPENAI_API_KEY」で渡すのが安全ですが
    # ここに直書きする場合は追加設定が必要です。

# Train configuration (学習設定)
train:
  device: cpu
  pipeline: simple # 16GB RAMなので 'full' ではなく 'simple' を推奨
  # 学習対象のベースモデルパス
  model_path: /home/matsuo/instructlab-granite4/models/granite-4.0-nano-instruct
  # 出力先をリポジトリ内に集約
  ckpt_output_dir: /home/matsuo/instructlab-granite4/checkpoint
  data_output_dir: /home/matsuo/instructlab-granite4/internal
  data_path: /home/matsuo/instructlab-granite4/datasets
  num_epochs: 3 # CPU学習は時間がかかるため、まずは少ないエポック数で。
  effective_batch_size: 4 # メモリ節約のため小さく設定

# Serve configuration
serve:
  backend: llama-cpp
  model_path: /home/matsuo/instructlab-granite4/models/granite-4.0-1b-Q4_K_M.gguf

metadata:
  cpu_info: Intel Core i5-1335U (13th Gen)
